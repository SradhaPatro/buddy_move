name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit --skipLibCheck

      - name: Lint
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npx vitest run

      - name: Build
        run: npm run build
